<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U1 PRO Тёлочка 👩🏼💖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-image: url('https://lh3.googleusercontent.com/d/1kiT2_3EAt5BQbL123_wrKJldGl9Ge6nY'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #db2777; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .pink-glow { text-shadow: 0 0 10px #f472b6; }
        /* Эффект матового стекла (50% прозрачности + blur 4px) */
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.50) !important;
            backdrop-filter: blur(4px);
        }
        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        .bar-shine {
            animation: shine 3s infinite linear;
        }
        #authStatusText {
            white-space: pre-line;
        }
        /* Убираем стрелочки для идеальной центровки */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="flex flex-col items-center md:items-end justify-center min-h-screen p-4 md:pr-[10vw]">
    
    <!-- Видеофон (скрыт по умолчанию) -->
    <video id="bgVideo" loop muted playsinline class="fixed inset-0 w-full h-full object-cover -z-10 hidden"></video>

    <!-- Музыкальный элемент -->
    <audio id="bgMusic" loop src="https://ulikloctar.github.io/U1-PRO-Girl/Taylor Swift - The Fate of Ophelia.mp3"></audio>

    <div class="glass-panel p-6 rounded-3xl shadow-2xl border-4 border-pink-500 text-center w-full max-w-md my-4 relative max-h-[90vh] overflow-y-auto">
        
        <!-- Кнопка переключения видео слева (теперь открывает YouTube) -->
        <button id="videoToggle" class="absolute top-4 left-4 bg-pink-500/20 hover:bg-pink-500/40 text-pink-700 w-8 h-8 rounded-full flex items-center justify-center transition border border-pink-400/50 shadow-md" title="Смотреть видео">
            <span id="videoIcon" class="text-sm">🎬</span>
        </button>

        <!-- Кнопка перехода на сайт под видео кнопкой -->
        <a href="https://ulikloctar.github.io/U1-PRO-Girl/" class="absolute top-16 left-4 bg-pink-500/20 hover:bg-pink-500/40 text-pink-700 w-8 h-8 rounded-full flex items-center justify-center transition border border-pink-400/50 shadow-md" title="Перейти на сайт">
            <span class="text-sm">👩🏼</span>
        </a>

        <!-- Кнопка музыки справа -->
        <button id="musicToggle" class="absolute top-4 right-4 bg-pink-500/20 hover:bg-pink-500/40 text-pink-700 w-8 h-8 rounded-full flex items-center justify-center transition border border-pink-400/50 shadow-md" title="Музыка">
            <span id="musicIcon" class="text-sm">🎵</span>
        </button>

        <!-- Кнопка жесткого фейерверка справа (под музыкой) -->
        <button id="fireworkTrigger" class="absolute top-16 right-4 bg-pink-500/20 hover:bg-pink-500/40 text-pink-700 w-8 h-8 rounded-full flex items-center justify-center transition border border-pink-400/50 shadow-md" title="Запустить непрерывный фейерверк и дождь!">
            <span class="text-sm">🎆</span>
        </button>

        <h1 class="text-2xl font-bold mb-1 pink-glow font-serif">U1 PRO тёлочка 👩🏼💖</h1>
        
        <div class="text-[11px] font-bold text-pink-700 bg-pink-100/80 inline-block px-3 py-1 rounded-full mb-4">
            Накоплено с 1 июля 2026 года 😎
        </div>
        
        <!-- Секция счетчиков -->
        <div class="mb-4 space-y-3">
            <div id="counter" class="text-4xl font-mono font-bold text-pink-600">Загрузка...</div>
            <div class="bg-pink-50/70 p-3 rounded-2xl border-2 border-pink-100">
                <div id="counterUah" class="text-4xl font-mono font-bold text-pink-600">Загрузка...</div>
            </div>
        </div>

        <div class="mb-4 px-1">
            <div class="flex justify-between text-[10px] font-bold text-pink-700 mb-1">
                <span>Она уже ищет тебя 🙂💫</span>
                <span id="xpPercent">0.0000%</span>
            </div>
            <div class="w-full bg-pink-950/40 rounded-lg h-6 p-[3px] border-2 border-pink-600 shadow-[inset_0_2px_4px_rgba(0,0,0,0.6)] overflow-hidden relative">
                <div id="xpBar" class="h-full bg-gradient-to-r from-purple-500 via-pink-500 to-rose-500 rounded-md transition-all duration-1000 shadow-[0_0_10px_#ec4899] relative overflow-hidden" style="width: 0%">
                    <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/30 to-transparent w-1/2 h-full bar-shine"></div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent h-1/2 pointer-events-none"></div>
            </div>
        </div>
        
        <div id="message" class="text-sm italic text-pink-500 mb-4 h-12 flex items-center justify-center font-bold px-2">
            Юлик, скоро ты трахнешь свою сучку 🍌🍓🍑💞✨
        </div>

        <!-- Кнопка "Начать фарм" (скрыта, так как фарм запущен автоматически) -->
        <button id="startBtn" class="w-full bg-pink-500 text-white py-3 rounded-xl hover:bg-pink-600 transition mb-4 font-bold shadow-lg shadow-pink-200 hidden">НАЧАТЬ ФАРМ 🚀</button>

        <div id="adminPanel" class="mt-2 border-t border-pink-100 pt-3">
            <label class="block text-xs font-bold mb-1.5">Добавить свои сбережения:</label>
            <div class="flex gap-2 mb-3">
                <div class="w-20">
                    <span class="text-[9px] uppercase tracking-wider text-pink-400 font-bold block mb-1">Курс ₴/$</span>
                    <input type="number" id="rateInput" step="0.01" class="w-full p-2 border-2 border-pink-200 rounded-xl text-pink-600 font-bold text-center focus:outline-pink-400 text-xs">
                </div>
                <div class="flex-1">
                    <span class="text-[9px] uppercase tracking-wider text-pink-400 font-bold block mb-1">Сумма вклада</span>
                    <input type="number" id="manualInput" value="0" min="0" step="any" class="w-full p-2 border-2 border-pink-200 rounded-xl focus:outline-pink-400 text-pink-600 font-bold text-center text-xs">
                </div>
                <div class="w-24">
                    <span class="text-[9px] uppercase tracking-wider text-pink-400 font-bold block mb-1">Валюта</span>
                    <select id="currencySelect" class="w-full p-2 border-2 border-pink-200 rounded-xl focus:outline-pink-400 text-pink-600 font-bold bg-white text-xs text-center">
                        <option value="USD">$ USD</option>
                        <option value="UAH">₴ UAH</option>
                    </select>
                </div>
            </div>
            <button id="addSavingsBtn" class="w-full bg-pink-400 text-white py-2 rounded-xl hover:bg-pink-500 transition text-sm font-bold shadow-md">Добавить вклад 💖</button>
        </div>

        <!-- Уведомление об авторизации / статусе внизу -->
        <div id="authStatusText" class="text-[10px] text-pink-500/75 mt-2 font-bold transition-all duration-300"></div>

        <div class="text-[11px] text-pink-400 mt-2 font-semibold">
            Твои личные вклады: <span id="manualTotalUsd">0.00</span> $ (<span id="manualTotalUah">0.00</span> ₴)
        </div>
    </div>

    <!-- Сверхвысокопроизводительный холст для анимации фейерверков и дождя из денег -->
    <canvas id="effectsCanvas" class="fixed inset-0 pointer-events-none z-50 overflow-hidden"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBgrOFMkMZ9aV3Kp5ISSdrvpfwO2NsJJEQ",
          authDomain: "super-girl-ac3f3.firebaseapp.com",
          projectId: "super-girl-ac3f3",
          storageBucket: "super-girl-ac3f3.firebasestorage.app",
          messagingSenderId: "992475956281",
          appId: "1:992475956281:web:03430bd128a37a3566b9e8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Новые скорректированные цели под U1 PRO
        const targetDrop = 22000; // Цель автоматического фарма (22 000 $) Это сумма на сколько подешевеет тёлочка за эти 5 лет, что можно прировнять к авто-фарму нашему )
        const barLimit = 38000;   // Предел шкалы в процентах (38 000 $) Это цена сучки + доставка в Харьков её пизды на мой член )
        const totalDuration = 5 * 365.25 * 24 * 60 * 60 * 1000; // 5 лет
        
        // Старт фарма жестко зафиксирован на 1 июля 2026 года (00:00:00)
        const forceStartDate = new Date('2026-07-01T00:00:00').getTime();
        let startDate = forceStartDate;
        let manualSavings = 0;
        let currentRate = 44.76;

        const rateInput = document.getElementById('rateInput');
        const startBtn = document.getElementById('startBtn');
        const adminPanel = document.getElementById('adminPanel');
        const addSavingsBtn = document.getElementById('addSavingsBtn');
        const authStatusText = document.getElementById('authStatusText');
        const mainDocRef = doc(db, "data", "main");

        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const musicIcon = document.getElementById('musicIcon');
        const fireworkTrigger = document.getElementById('fireworkTrigger');

        const bgVideo = document.getElementById('bgVideo');
        const videoToggle = document.getElementById('videoToggle');
        const videoIcon = document.getElementById('videoIcon');

        // Ссылка на видеофайл
        bgVideo.src = "https://assets.mixkit.co/videos/preview/mixkit-beautiful-dreamy-pink-clouds-background-41481-large.mp4";

        // Показываем статус авторизации тихонько внизу
        onAuthStateChanged(auth, (user) => {
            if (user && user.email === "ulikloctar@gmail.com") {
                authStatusText.innerText = "Привет, Юлик! 👩🏼💖";
                authStatusText.className = "text-[10px] text-green-600 mt-2 font-bold transition-all";
            } else if (user) {
                authStatusText.innerText = "Вошел посторонний аккаунт. Доступ закрыт ⛔";
                authStatusText.className = "text-[10px] text-red-500 mt-2 font-bold transition-all";
            } else {
                authStatusText.innerText = "";
                authStatusText.className = "text-[10px] text-pink-400 mt-2 font-bold transition-all";
            }
        });

        // Функция-защитник: проверяет авторизацию Юлика
        async function runWithAuth(action) {
            let user = auth.currentUser;
            if (!user) {
                authStatusText.innerText = "Авторизация... Подтверди, что ты Юлик! 🔑";
                authStatusText.className = "text-[10px] text-amber-500 mt-2 font-bold animate-pulse";
                try {
                    const result = await signInWithPopup(auth, provider);
                    user = result.user;
                } catch (error) {
                    console.error("Ошибка авторизации: ", error);
                    authStatusText.innerText = "Ты не Юлик! Редактировать нельзя! 👩🏼😡\nРедактировать можно только Юлику! 😎";
                    authStatusText.className = "text-[10px] text-red-500 mt-2 font-bold";
                    return;
                }
            }

            if (user && user.email === "ulikloctar@gmail.com") {
                action();
            } else {
                authStatusText.innerText = "Ты не Юлик! Редактировать нельзя! 👩🏼😡\nРедактировать можно только Юлику! 😎";
                authStatusText.className = "text-[10px] text-red-600 mt-2 font-bold";
            }
        }

        // Логика кнопки музыки (делает паузу, сохраняя текущую позицию)
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusicState();
        });

        function toggleMusicState() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicIcon.innerText = '🔊';
                }).catch((err) => console.log("Музыка не смогла запуститься:", err));
            } else {
                bgMusic.pause();
                musicIcon.innerText = '🔇';
            }
        }

        function forcePlayMusic() {
            if (bgMusic.paused) {
                bgMusic.play().then(() => {
                    musicIcon.innerText = '🔊';
                }).catch((err) => console.log("Музыка не смогла запуститься:", err));
            }
        }

        // Логика кнопки видео (переход на YouTube в новой вкладке)
        videoToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            window.open('https://www.youtube.com/watch?v=hrsvBpZzJe0', '_blank');
        });

        onSnapshot(mainDocRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Прогресс сбрасывается и жестко считается с 1 июля 2026 года
                startDate = forceStartDate;
                manualSavings = parseFloat(data.manualSavings) || 0;
                currentRate = parseFloat(data.currentRate) || 44.76;
                rateInput.value = currentRate.toFixed(2);
                
                // Кнопка скрывается, так как автоматический прогресс уже идет
                startBtn.classList.add('hidden');
                
                updateCounter();
            }
        });

        function updateCounter() {
            const rate = parseFloat(rateInput.value) || 44.76;
            document.getElementById('manualTotalUsd').innerText = manualSavings.toFixed(2);
            document.getElementById('manualTotalUah').innerText = (manualSavings * rate).toFixed(2);
            
            if (!startDate) {
                document.getElementById('counter').innerText = '0.00 $';
                document.getElementById('counterUah').innerText = '0.00 ₴';
                document.getElementById('xpBar').style.width = '0%';
                document.getElementById('xpPercent').innerText = '0.0000%';
                return;
            }
            
            const progress = Math.min((Date.now() - startDate) / totalDuration, 1);
            const currentSavings = (progress * targetDrop) + manualSavings;
            document.getElementById('counter').innerText = currentSavings.toFixed(2) + ' $';
            document.getElementById('counterUah').innerText = (currentSavings * rate).toFixed(2) + ' ₴';
            const xpPct = (currentSavings / barLimit) * 100;
            document.getElementById('xpBar').style.width = `${Math.min(xpPct, 100).toFixed(6)}%`;
            document.getElementById('xpPercent').innerText = `${xpPct.toFixed(6)}%`;
        }

        // Логика добавления вклада
        const addSavingsLogic = async () => {
            const val = parseFloat(document.getElementById('manualInput').value) || 0;
            if (val <= 0) return;

            const rate = parseFloat(rateInput.value) || 44.76;
            const currency = document.getElementById('currencySelect').value;
            const usdToAdd = currency === 'USD' ? val : val / rate;

            const newSavings = manualSavings + usdToAdd;
            await setDoc(mainDocRef, { manualSavings: newSavings, currentRate: rate }, { merge: true });
            document.getElementById('manualInput').value = "0";

            // Праздничный 10-секундный взрыв при вкладе!
            startPartyCelebration(false);
        };

        addSavingsBtn.addEventListener('click', () => {
            runWithAuth(addSavingsLogic);
        });

        // Сверхвысокопроизводительный холст для анимации фейерверков и дождя из денег
        const canvas = document.getElementById('effectsCanvas');
        const ctx = canvas.getContext('2d');
        
        let rockets = [];
        let particles = [];
        let moneyItems = [];
        let animationId = null;

        // Переменные управления праздником
        let continuousFireworks = false;
        let emojiRainActive = false;
        let emojiRainTimeout = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Сверхнеоновые цвета для фейерверков
        const neonColors = [
            { r: 255, g: 20, b: 147 },   // Ярко-розовый
            { r: 244, g: 63, b: 94 },    // Розово-красный (Rose 500)
            { r: 168, g: 85, b: 247 },   // Насыщенный фиолетовый
            { r: 236, g: 72, b: 153 },   // Маджента
            { r: 251, g: 191, b: 36 },   // Золотой
            { r: 34, g: 211, b: 238 }    // Неоновый бирюзовый
        ];

        class MoneyItem {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50;
                this.vy = 1.2 + Math.random() * 2.3;
                this.vx = (Math.random() - 0.5) * 1.2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.04;
                
                // Единый базовый размер для идеальной пропорции и соответствия самой крупной банкноте
                const baseSize = 24;
                this.scale = baseSize;

                // Распределение: 30% монетки, 30% банкноты, 40% сочные эмодзи
                const randType = Math.random();
                if (randType < 0.3) {
                    this.type = 'coin';
                } else if (randType < 0.6) {
                    this.type = 'dollar';
                } else {
                    this.type = 'emoji';
                    const emojiSubtypes = ['vagina', 'girl', 'heart', 'tits', 'penis', 'sparkles', 'diamond', 'peach'];
                    this.emojiSubtype = emojiSubtypes[Math.floor(Math.random() * emojiSubtypes.length)];
                }
                
                this.swingSpeed = 0.025 + Math.random() * 0.035;
                this.swingAmount = 0.6 + Math.random() * 1.2;
                this.time = Math.random() * 100;
            }

            update() {
                this.time += this.swingSpeed;
                this.y += this.vy;
                this.x += this.vx + Math.sin(this.time) * this.swingAmount;
                this.rotation += this.rotationSpeed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                if (this.type === 'coin') {
                    // Рисуем красивую мультяшную золотую монетку. Увеличена на 30%
                    const r = this.scale * 0.45 * 1.30;
                    
                    // Темно-золотая обводка для мультяшности
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.fillStyle = '#b45309'; 
                    ctx.fill();
                    
                    // Основное золотое тело монеты
                    ctx.beginPath();
                    ctx.arc(0, 0, r * 0.85, 0, Math.PI * 2);
                    ctx.fillStyle = '#fbbf24'; 
                    ctx.fill();

                    // Внутренний ободок
                    ctx.beginPath();
                    ctx.arc(0, 0, r * 0.65, 0, Math.PI * 2);
                    ctx.strokeStyle = '#f59e0b';
                    ctx.lineWidth = 1.5 * 1.30;
                    ctx.stroke();

                    // Блик света (эффект глянца)
                    ctx.beginPath();
                    ctx.arc(-r * 0.25, -r * 0.25, r * 0.2, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                    ctx.fill();

                    // Символ доллара по центру монетки
                    ctx.fillStyle = '#b45309';
                    ctx.font = `bold ${r * 0.9}px "Courier New", monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', 0, r * 0.05);

                } else if (this.type === 'dollar') {
                    // Рисуем красивый мультяшный доллар
                    const w = this.scale * 1.6;
                    const h = this.scale * 0.9;

                    // Темно-зеленая обводка-основа
                    ctx.fillStyle = '#064e3b';
                    ctx.beginPath();
                    if (ctx.roundRect) {
                        ctx.roundRect(-w/2, -h/2, w, h, 4);
                    } else {
                        ctx.rect(-w/2, -h/2, w, h);
                    }
                    ctx.fill();

                    // Сама банкнота (салатовый мультяшный цвет)
                    ctx.fillStyle = '#a7f3d0'; 
                    ctx.beginPath();
                    if (ctx.roundRect) {
                        ctx.roundRect(-w/2 + 2, -h/2 + 2, w - 4, h - 4, 3);
                    } else {
                        ctx.rect(-w/2 + 2, -h/2 + 2, w - 4, h - 4);
                    }
                    ctx.fill();

                    // Тонкая внутренняя рамка
                    ctx.strokeStyle = '#047857';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-w/2 + 4, -h/2 + 4, w - 8, h - 8);

                    // Кружок в центре банкноты
                    ctx.beginPath();
                    ctx.ellipse(0, 0, w * 0.22, h * 0.32, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#ecfdf5'; 
                    ctx.fill();
                    ctx.strokeStyle = '#047857';
                    ctx.stroke();

                    // Знак доллара по центру
                    ctx.fillStyle = '#064e3b';
                    ctx.font = `bold ${h * 0.55}px "Courier New", monospace`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', 0, 0);

                    // Циферки "1" по углам
                    ctx.font = `bold ${h * 0.25}px Arial`;
                    ctx.fillStyle = '#047857';
                    ctx.fillText('$', -w/2 + 8, -h/2 + 9);
                    ctx.fillText('$', w/2 - 8, h/2 - 9);

                } else {
                    const S = this.scale;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    if (this.emojiSubtype === 'tits') {
                        // Сиськи: 2 спелых апельсина, увеличенных на дополнительные 10% (S * 0.825)
                        const titSize = S * 0.825;
                        ctx.font = `${titSize}px Arial`;
                        ctx.fillText('🍊', -titSize * 0.45, 0);
                        ctx.fillText('🍊', titSize * 0.45, 0);
                    } else if (this.emojiSubtype === 'penis') {
                        // Член уменьшен на 10% (memberScale = S * 1.17)
                        const memberScale = S * 1.17;
                        ctx.font = `${memberScale}px Arial`;
                        ctx.fillText('🍌', 0, 0);

                        // Яйца уменьшены на 20% (eggSize = memberScale * 0.4)
                        const eggSize = memberScale * 0.4;
                        ctx.font = `${eggSize}px Arial`;
                        // Яйца расположены у основания банана строго по левому краю!
                        ctx.fillText('🍊', -memberScale * 0.45, -memberScale * 0.15);
                        ctx.fillText('🍊', -memberScale * 0.45, memberScale * 0.15);
                    } else if (this.emojiSubtype === 'vagina') {
                        // Клубника пизда
                        ctx.font = `${S}px Arial`;
                        ctx.fillText('🍓', 0, 0);
                    } else if (this.emojiSubtype === 'girl') {
                        // Блондинка тёлочка 👩🏼
                        ctx.font = `${S}px Arial`;
                        ctx.fillText('👩🏼', 0, 0);
                    } else if (this.emojiSubtype === 'heart') {
                        // Сердечки
                        ctx.font = `${S}px Arial`;
                        ctx.fillText('💖', 0, 0);
                    } else if (this.emojiSubtype === 'sparkles') {
                        ctx.font = `${S}px Arial`;
                        ctx.fillText('✨', 0, 0);
                    } else if (this.emojiSubtype === 'diamond') {
                        ctx.font = `${S}px Arial`;
                        ctx.fillText('💎', 0, 0);
                    } else if (this.emojiSubtype === 'peach') {
                        // Персик - попка 🍑
                        ctx.font = `${S}px Arial`;
                        ctx.fillText('🍑', 0, 0);
                    }
                }

                ctx.restore();
            }
        }

        class Rocket {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                const angle = Math.atan2(targetY - startY, targetX - startX);
                this.speed = 10 + Math.random() * 5;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                this.trail = [];
                this.trailMaxLength = 25; // Сделали след длиннее и выразительнее
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailMaxLength) {
                    this.trail.shift();
                }

                this.x += this.vx;
                this.y += this.vy;

                // Добавление более плотных и крупных искр в след полета ракеты
                if (Math.random() < 0.65) {
                    particles.push(new Particle(
                        this.x, 
                        this.y, 
                        (Math.random() - 0.5) * 2.0, 
                        (Math.random() - 0.5) * 2.0 + 2.0, 
                        { r: 253, g: 224, b: 71 }, // Золотые сверкающие искры
                        0.8, 
                        0.02,
                        3.5 // Крупные искры
                    ));
                }
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 244, 200, 0.95)';
                ctx.lineWidth = 5.5; // Сделали линию ракеты насыщенной и жирной
                ctx.lineCap = 'round';
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    if (i === 0) ctx.moveTo(point.x, point.y);
                    else ctx.lineTo(point.x, point.y);
                }
                ctx.stroke();
            }

            isDead() {
                return this.vy >= 0 || this.y <= this.targetY;
            }
        }

        // Физическая частица взрыва фейерверка
        class Particle {
            constructor(x, y, vx, vy, color, alpha = 1, decay = 0.012, size = 2) {
                this.x = x;
                this.y = y;
                this.lastX = x;
                this.lastY = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = alpha;
                this.decay = decay;
                this.gravity = 0.055;
                this.friction = 0.975;
                this.size = size + Math.random() * 2.0;
            }

            update() {
                this.lastX = this.x;
                this.lastY = this.y;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity; // Гравитация тянет вниз
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay; // Медленное угасание
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.lastX, this.lastY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        function explode(x, y) {
            const isHeart = Math.random() < 0.35; // 35% шанс взрыва в форме сердечка 💖

            if (isHeart) {
                // Взрыв в форме СЕРДЦА - ТЕПЕРЬ СВЕРХНАСЫЩЕННЫЙ
                const heartColor = { r: 244, g: 63, b: 94 }; // Изумительный Rose-цвет
                const particlesCount = 160; // Намного больше плотности!
                for (let i = 0; i < particlesCount; i++) {
                    const angle = (i / particlesCount) * Math.PI * 2;
                    // Математическая формула сердца
                    const px = 16 * Math.pow(Math.sin(angle), 3);
                    const py = -(13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle));
                    
                    const multiplier = 0.32 + Math.random() * 0.10; // Мощный выброс
                    const decay = 0.006 + Math.random() * 0.005; // Живут гораздо дольше!
                    particles.push(new Particle(
                        x, 
                        y, 
                        px * multiplier, 
                        py * multiplier, 
                        heartColor, 
                        1, 
                        decay, 
                        4.2 // Крупные сверкающие точки
                    ));
                }
            } else {
                // Мощный круговой неоновый взрыв - ТЕПЕРЬ НАМНОГО ПЛОТНЕЕ
                const color = neonColors[Math.floor(Math.random() * neonColors.length)];
                const particlesCount = 220; // Огромное количество искр для насыщенности
                for (let i = 0; i < particlesCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1.5 + Math.random() * 9.5; // Разлетаются быстрее
                    const decay = 0.007 + Math.random() * 0.013; // Плавное приятное угасание
                    particles.push(new Particle(
                        x, 
                        y, 
                        Math.cos(angle) * speed, 
                        Math.sin(angle) * speed, 
                        color, 
                        1, 
                        decay, 
                        3.5 // Крупные искры
                    ));
                }
            }
        }

        // Функция одиночного пуска ракеты
        function spawnSingleRocket() {
            const startX = Math.random() * canvas.width;
            const startY = canvas.height + 25;
            const targetX = startX + (Math.random() - 0.5) * 250;
            const targetY = canvas.height * 0.12 + Math.random() * (canvas.height * 0.45);
            rockets.push(new Rocket(startX, startY, targetX, targetY));
            startAnimationLoop();
        }

        // Логика бесконечного запуска ракет
        function spawnContinuousRocket() {
            if (!continuousFireworks) return;
            spawnSingleRocket();
            const nextDelay = 350 + Math.random() * 800;
            setTimeout(spawnContinuousRocket, nextDelay);
        }

        // Запуск цикла генерации падающего добра
        function spawnEmojiLoop() {
            if (!emojiRainActive) return;
            moneyItems.push(new MoneyItem());
            startAnimationLoop();
            
            const nextDelay = 60 + Math.random() * 100; // Интенсивность падения
            setTimeout(spawnEmojiLoop, nextDelay);
        }

        // Функция обновления внешнего вида кнопки фейерверка
        function updateFireworkButtonUI() {
            if (continuousFireworks || emojiRainActive) {
                fireworkTrigger.classList.add('bg-pink-500', 'text-white', 'scale-110', 'animate-pulse');
                fireworkTrigger.classList.remove('bg-pink-500/20', 'text-pink-700');
            } else {
                fireworkTrigger.classList.remove('bg-pink-500', 'text-white', 'scale-110', 'animate-pulse');
                fireworkTrigger.classList.add('bg-pink-500/20', 'text-pink-700');
            }
        }

        // Запуск полного режима Праздника (бесконечного или временного на 10 сек)
        function startPartyCelebration(infinite = false) {
            forcePlayMusic();
            
            if (!continuousFireworks) {
                continuousFireworks = true;
                spawnContinuousRocket();
            }
            
            if (!emojiRainActive) {
                emojiRainActive = true;
                spawnEmojiLoop();
            }
            
            updateFireworkButtonUI();

            if (!infinite) {
                // Если это временный праздник (например, при внесении вклада) - выключаем его через 10 секунд
                if (emojiRainTimeout) clearTimeout(emojiRainTimeout);
                emojiRainTimeout = setTimeout(() => {
                    stopPartyCelebration();
                }, 10000);
            } else {
                // Если включен бесконечный ручной режим, сбрасываем таймер выключения
                if (emojiRainTimeout) {
                    clearTimeout(emojiRainTimeout);
                    emojiRainTimeout = null;
                }
            }
        }

        // Полная остановка праздника (и дождя, и фейерверков)
        function stopPartyCelebration() {
            continuousFireworks = false;
            emojiRainActive = false;
            if (emojiRainTimeout) {
                clearTimeout(emojiRainTimeout);
                emojiRainTimeout = null;
            }
            updateFireworkButtonUI();
        }

        // Обработка клика по кнопке фейерверка (переключатель бесконечного режима)
        fireworkTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            if (continuousFireworks || emojiRainActive) {
                stopPartyCelebration();
            } else {
                startPartyCelebration(true); // Запускаем бесконечную красоту!
            }
        });

        // Анимационный цикл 60fps
        function startAnimationLoop() {
            if (!animationId) {
                renderEffects();
            }
        }

        function renderEffects() {
            // Очищаем прозрачный холст полностью
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Обновляем и рисуем РАКЕТЫ
            for (let i = rockets.length - 1; i >= 0; i--) {
                const r = rockets[i];
                r.update();
                r.draw();
                if (r.isDead()) {
                    explode(r.x, r.y);
                    rockets.splice(i, 1);
                }
            }

            // Рендерим и обновляем ЧАСТИЦЫ фейерверка с эффектом свечения
            ctx.save();
            ctx.globalCompositeOperation = 'screen'; // Сверхэффект свечения
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            ctx.restore();

            // Обновляем и рендерим МОНЕТЫ / ДОЛЛАРЫ / СМАЙЛЫ
            for (let i = moneyItems.length - 1; i >= 0; i--) {
                const m = moneyItems[i];
                m.update();
                m.draw();
                if (m.y > canvas.height + 60) {
                    moneyItems.splice(i, 1);
                }
            }

            // Продолжаем цикл анимации, если есть активные эффекты или активен режим праздника
            if (rockets.length > 0 || particles.length > 0 || moneyItems.length > 0 || continuousFireworks || emojiRainActive) {
                animationId = requestAnimationFrame(renderEffects);
            } else {
                animationId = null;
            }
        }

        setInterval(updateCounter, 1000);
    </script>
